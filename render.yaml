services:
  - type: web
    name: korean-audio-api
    env: python
    plan: free

    buildCommand: pip install -r requirements.txt

    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: GEMINI_API_KEY
        sync: false

      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite